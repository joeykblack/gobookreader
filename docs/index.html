<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>GoBooks Reader PWA</title>
    <link rel="manifest" href="./manifest.json" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #e5e7eb;
      }
      main {
        width: min(980px, calc(100% - 2rem));
        padding: 1.25rem;
        border: 1px solid #334155;
        border-radius: 12px;
        background: #111827;
        position: relative;
      }
      h1 { margin-top: 0; }
      .ok { color: #86efac; }
      .warn { color: #fca5a5; }
      code { background: #1f2937; padding: 0.1rem 0.3rem; border-radius: 4px; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
      }
      .panel {
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0.75rem;
        background: #0f172a;
      }
      ul {
        margin: 0;
        padding-left: 1.25rem;
        max-height: 300px;
        overflow: auto;
      }
      button {
        background: #1d4ed8;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 0.45rem 0.7rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .book-btn {
        all: unset;
        cursor: pointer;
        color: #bfdbfe;
      }
      .controls {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn-danger {
        background: #7f1d1d;
        color: #fecaca;
        padding: 0.3rem 0.5rem;
        font-size: 0.85rem;
      }
      .btn-danger:hover {
        background: #991b1b;
      }
      .reader-panel {
        margin-top: 1rem;
      }
      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .topbar-copy {
        min-width: 0;
      }
      .menu-wrap {
        position: relative;
        flex-shrink: 0;
      }
      .menu-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border: 1px solid #334155;
        border-radius: 10px;
        cursor: pointer;
        background: #0f172a;
        color: #e5e7eb;
        font-size: 1.25rem;
      }
      .menu-button:hover,
      .menu-button[aria-expanded="true"] {
        background: #1e293b;
      }
      .menu-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.45);
        z-index: 19;
      }
      .menu-panel {
        position: absolute;
        top: calc(100% + 0.5rem);
        right: 0;
        min-width: 220px;
        padding: 0.35rem;
        border: 1px solid #334155;
        border-radius: 12px;
        background: #0f172a;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
        z-index: 20;
      }
      .menu-panel[hidden],
      .menu-backdrop[hidden] {
        display: none;
      }
      .menu-item {
        display: block;
        width: 100%;
        text-align: left;
        background: transparent;
        color: #e5e7eb;
        border: 0;
        border-radius: 8px;
        padding: 0.8rem 0.9rem;
        font-size: 0.98rem;
      }
      .menu-item:hover,
      .menu-item.active {
        background: #1d4ed8;
        color: #fff;
      }
      .reader-controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 0.6rem;
      }
      .reader-spacer {
        margin-left: auto;
      }
      .queue-summary {
        margin: 0;
        color: #cbd5e1;
      }
      .queue-list {
        margin: 0;
        padding-left: 0;
        list-style: none;
      }
      .queue-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #0f172a;
        cursor: pointer;
        transition: background 0.2s;
      }
      .queue-item:hover {
        background: #1e293b;
        border-color: #475569;
      }
      .queue-item-section {
        font-weight: 500;
        color: #e5e7eb;
        margin-bottom: 0.25rem;
      }
      .queue-item-meta {
        font-size: 0.82rem;
        color: #9ca3af;
      }
      .chart-wrap {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
        height: 110px;
        margin-bottom: 1.5rem;
        padding: 0 0.25rem;
      }
      .chart-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.15rem;
        min-width: 0;
      }
      .chart-bar-area {
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        height: 72px;
      }
      .chart-bar {
        width: 100%;
        border-radius: 4px 4px 0 0;
        min-height: 2px;
      }
      .chart-count {
        font-size: 0.78rem;
        color: #9ca3af;
      }
      .chart-label {
        font-size: 0.72rem;
        color: #6b7280;
        text-align: center;
        white-space: nowrap;
      }
      .info-list {
        margin: 0;
        padding: 0;
        list-style: none;
        max-height: 400px;
        overflow-y: auto;
      }
      .info-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 0.75rem;
        margin-bottom: 0.4rem;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #0f172a;
      }
      .info-item-body {
        flex: 1;
        cursor: pointer;
        min-width: 0;
      }
      .info-item-body:hover .info-item-section { color: #93c5fd; }
      .info-item-section {
        font-weight: 500;
        color: #e5e7eb;
        margin-bottom: 0.15rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .info-item-meta {
        font-size: 0.8rem;
        color: #9ca3af;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .due-badge {
        font-size: 0.72rem;
        padding: 0.2rem 0.45rem;
        border-radius: 4px;
        white-space: nowrap;
        font-weight: 500;
        flex-shrink: 0;
      }
      .due-overdue  { background: #450a0a; color: #f87171; }
      .due-today    { background: #431407; color: #fb923c; }
      .due-tomorrow { background: #422006; color: #fdba74; }
      .due-week     { background: #1e3a5f; color: #93c5fd; }
      .due-later    { background: #14532d; color: #86efac; }
      #reader-frame {
        width: 100%;
        height: 70dvh;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #fff;
      }
      @media (max-width: 640px) {
        body {
          display: block;
          background: #0b1020;
        }
        main {
          width: auto;
          min-height: 100dvh;
          margin: 0;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
          padding: 1rem;
        }
        .menu-panel {
          position: fixed;
          top: 0.75rem;
          right: 0.75rem;
          left: 0.75rem;
          min-width: 0;
        }
        .reader-controls {
          align-items: stretch;
        }
        .reader-controls > * {
          flex: 1 1 auto;
        }
        .reader-controls label {
          display: flex;
          flex-direction: column;
          gap: 0.3rem;
        }
        .reader-controls select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div class="topbar-copy">
          <h1>GoBooks Reader PWA</h1>
          <p>Step 7: review queue for items due today, with SM-2 rating in reader context.</p>
        </div>
        <div class="menu-wrap">
          <button id="menu-toggle" class="menu-button" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="app-menu">☰</button>
          <div id="menu-backdrop" class="menu-backdrop" hidden></div>
          <div id="app-menu" class="menu-panel" role="menu" hidden>
            <button id="menu-read" class="menu-item" type="button" role="menuitem">Read</button>
            <button id="menu-review" class="menu-item" type="button" role="menuitem">Review</button>
            <button id="menu-library" class="menu-item" type="button" role="menuitem">Library</button>
            <button id="menu-import" class="menu-item" type="button" role="menuitem">Import</button>
            <button id="menu-info" class="menu-item" type="button" role="menuitem">Review Info</button>
          </div>
        </div>
      </div>
      <p id="sw-status">Service worker: checking…</p>
      <p id="app-status">Initializing…</p>

      <section id="import-view" class="panel" style="margin-bottom: 1rem; display: none;">
        <h2 style="margin-top: 0;">Import EPUB</h2>
        <div class="controls">
          <input id="epub-file" type="file" accept=".epub,application/epub+zip" />
          <button id="import-button" type="button">Import</button>
        </div>
      </section>

      <section id="bookshelf-view" class="grid">
        <div class="panel">
          <h2 style="margin-top: 0;">Imported books</h2>
          <ul id="books-list"></ul>
        </div>
      </section>

      <section id="queue-view" class="panel" style="display: none;">
        <h2 style="margin-top: 0;">Review queue</h2>
        <p id="review-queue-summary" class="queue-summary">Loading review queue…</p>
      </section>

      <section id="info-view" class="panel" style="display: none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
          <h2 style="margin: 0;">Review info</h2>
          <button id="clear-all-reviews" type="button" class="btn-danger">Clear all</button>
        </div>
        <div id="review-chart" class="chart-wrap"></div>
        <ul id="review-info-list" class="info-list"></ul>
      </section>

      <section id="reader-panel" class="panel reader-panel" style="display: none;">
        <h2 id="reader-title" style="margin-top: 0;">Reader</h2>
        <div class="reader-controls">
          <button id="reader-prev" type="button">Prev</button>
          <button id="reader-next" type="button">Next</button>
          <button id="reader-contents" type="button">Contents</button>
          <label>
            Chapter:
            <select id="reader-chapter-select"></select>
          </label>
          <button id="reader-next-review" type="button" class="reader-spacer" style="display: none;">Next review</button>
          <button id="reader-close" type="button">Close reader</button>
        </div>
        <iframe id="reader-frame" sandbox="allow-scripts allow-same-origin" title="Chapter reader"></iframe>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
    <script type="module">
      const appStatus = document.getElementById('app-status')

      if (location.protocol === 'file:') {
        appStatus.textContent = 'This app must be served over http(s), not file://. Start a local server and open the docs URL.'
        appStatus.className = 'warn'
      } else {
        import('./js/app.js').catch(err => {
          appStatus.textContent = `Failed to start app: ${err.message}`
          appStatus.className = 'warn'
        })
      }
    </script>
  </body>
</html>
