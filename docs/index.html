<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>GoBooks Reader PWA</title>
    <link rel="manifest" href="./manifest.json" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #e5e7eb;
      }
      main {
        width: min(980px, calc(100% - 2rem));
        padding: 1.25rem;
        border: 1px solid #334155;
        border-radius: 12px;
        background: #111827;
      }
      h1 { margin-top: 0; }
      .ok { color: #86efac; }
      .warn { color: #fca5a5; }
      code { background: #1f2937; padding: 0.1rem 0.3rem; border-radius: 4px; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
      }
      .panel {
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0.75rem;
        background: #0f172a;
      }
      ul {
        margin: 0;
        padding-left: 1.25rem;
        max-height: 300px;
        overflow: auto;
      }
      button {
        background: #1d4ed8;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 0.45rem 0.7rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .book-btn {
        all: unset;
        cursor: pointer;
        color: #bfdbfe;
      }
      .controls {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn-danger {
        background: #7f1d1d;
        color: #fecaca;
        padding: 0.3rem 0.5rem;
        font-size: 0.85rem;
      }
      .btn-danger:hover {
        background: #991b1b;
      }
      .reader-panel {
        margin-top: 1rem;
      }
      .reader-controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 0.6rem;
      }
      #reader-frame {
        width: 100%;
        height: 70dvh;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GoBooks Reader PWA</h1>
      <p>Step 5: import EPUB, manage bookshelf, read chapters, hide answers behind reveal button.</p>
      <p id="sw-status">Service worker: checking…</p>
      <p id="app-status">Initializing…</p>

      <section class="panel" style="margin-bottom: 1rem;">
        <h2 style="margin-top: 0;">Import EPUB</h2>
        <div class="controls">
          <input id="epub-file" type="file" accept=".epub,application/epub+zip" />
          <button id="import-button" type="button">Import</button>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <h2 style="margin-top: 0;">Imported books</h2>
          <ul id="books-list"></ul>
        </div>

        <div class="panel">
          <h2 id="selected-book-title" style="margin-top: 0;">No book selected</h2>
          <ul id="chapter-list"></ul>
        </div>
      </section>

      <section id="reader-panel" class="panel reader-panel" style="display: none;">
        <h2 id="reader-title" style="margin-top: 0;">Reader</h2>
        <div class="reader-controls">
          <button id="reader-prev" type="button">Prev</button>
          <button id="reader-next" type="button">Next</button>
          <label>
            Chapter:
            <select id="reader-chapter-select"></select>
          </label>
          <button id="reader-close" type="button">Close reader</button>
        </div>
        <iframe id="reader-frame" sandbox="allow-scripts allow-same-origin" title="Chapter reader"></iframe>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
    <script type="module">
      const appStatus = document.getElementById('app-status')

      if (location.protocol === 'file:') {
        appStatus.textContent = 'This app must be served over http(s), not file://. Start a local server and open the docs URL.'
        appStatus.className = 'warn'
      } else {
        import('./js/app.js').catch(err => {
          appStatus.textContent = `Failed to start app: ${err.message}`
          appStatus.className = 'warn'
        })
      }
    </script>
  </body>
</html>
